<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PMMA — Mapa CPI 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#0c1118;--s1:#161d27;--s2:#1e2633;--s3:#28303f;
  --bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.05);
  --t1:#e8f0fe;--t2:#8b9fc0;--t3:#4a5568;
  --c1:#e8a020;--c2:#4fa8f5;--c3:#e05030;
  --c4:#38b85a;--c5:#9b6ef5;--c6:#d4b830;
  --c7:#28d090;--c8:#8a9ab8;
  --hh:56px; /* header height */
  --ph:44px; /* pills bar height */
  --bh:54px; /* bottom bar height */
  --green-wa:#25D366;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Barlow',sans-serif;background:var(--bg);color:var(--t1)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--t3);border-radius:2px}

/* ══ HEADER ══ */
header{
  position:fixed;top:0;left:0;right:0;z-index:1100;
  height:var(--hh);background:var(--s1);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:.6rem;padding:0 .85rem;
}
.logo{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.logo-shield{
  width:34px;height:34px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(145deg,#1b3d72,#0e2560);
  border:1px solid rgba(100,160,255,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.logo-pm{font-size:.44rem;font-weight:900;color:#c8d8ff;letter-spacing:.1em;line-height:1.2}
.logo-ma{font-size:.5rem;font-weight:900;color:#f0b030;letter-spacing:.08em}
.logo-txt{display:flex;flex-direction:column}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.04em;line-height:1.1}
.logo-sub{font-size:.52rem;color:var(--t2);font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
/* Search */
.sw{position:relative;flex:1;min-width:0}
.si{
  width:100%;background:var(--s2);border:1px solid var(--bd);
  border-radius:8px;padding:.44rem .8rem .44rem 2rem;
  color:var(--t1);font-family:'Barlow',sans-serif;font-size:.82rem;font-weight:500;
  outline:none;transition:border-color .18s,box-shadow .18s;
}
.si:focus{border-color:rgba(79,168,245,.5);box-shadow:0 0 0 3px rgba(79,168,245,.1)}
.si::placeholder{color:var(--t3)}
.si-ico{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.82rem;pointer-events:none}
.sdrop{
  position:absolute;top:calc(100% + 5px);left:0;right:0;
  background:var(--s2);border:1px solid var(--bd);border-radius:10px;
  max-height:55vh;overflow-y:auto;z-index:4000;
  box-shadow:0 16px 48px rgba(0,0,0,.7);display:none;
}
.sdrop.open{display:block}
.sd-grp{padding:.32rem .8rem .15rem;font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--t3);background:var(--s1);position:sticky;top:0}
.sd-item{display:flex;align-items:center;gap:.6rem;padding:.52rem .85rem;cursor:pointer;transition:background .1s}
.sd-item:hover,.sd-item:active{background:var(--s3)}
.sd-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sd-main{flex:1;min-width:0}
.sd-name{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd-meta{font-size:.63rem;color:var(--t2);margin-top:.06rem;font-family:'JetBrains Mono',monospace}
.sd-tag{font-size:.58rem;font-weight:700;padding:.16rem .48rem;border-radius:4px;font-family:'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0}
.sd-empty{padding:1rem;text-align:center;color:var(--t3);font-size:.8rem}

/* ══ MAP ══ */
#map{
  position:fixed;
  top:calc(var(--hh) + var(--ph));left:0;right:0;
  bottom:var(--bh);
  z-index:1;
}

/* ══ PILLS BAR ══ */
.pills-bar{
  position:fixed;top:var(--hh);left:0;right:0;z-index:1090;
  height:var(--ph);background:var(--s1);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:.4rem;
  padding:0 .85rem;overflow-x:auto;
}
.pills-bar::-webkit-scrollbar{display:none}
.cpill{
  flex-shrink:0;padding:.26rem .75rem;border-radius:20px;
  font-size:.7rem;font-weight:700;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.18);
  color:var(--t2);background:transparent;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;
  transition:all .15s;white-space:nowrap;
}
.cpill.todos{border-color:rgba(255,255,255,.35);color:var(--t1)}
.cpill.todos.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.6)}
.cpill.active{color:#fff}
.leaflet-container{background:#0c1118!important}
.leaflet-control-zoom{margin:8px!important}
.leaflet-control-zoom a{background:var(--s2)!important;color:var(--t1)!important;border:1px solid var(--bd)!important;width:30px!important;height:30px!important;line-height:30px!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:var(--s3)!important}
.leaflet-control-attribution{display:none!important}
/* Popup */
.leaflet-popup-content-wrapper{
  background:var(--s1)!important;border:1px solid var(--bd)!important;
  border-radius:14px!important;box-shadow:0 10px 40px rgba(0,0,0,.75)!important;
  color:var(--t1)!important;padding:0!important;
  max-width:310px!important;
}
.leaflet-popup-tip{background:var(--s1)!important}
.leaflet-popup-close-button{color:var(--t2)!important;top:8px!important;right:10px!important;font-size:16px!important;z-index:10}
.leaflet-popup-content{margin:0!important;width:auto!important}

/* ══ POPUP CARD ══ */
.pu{padding:13px 14px;min-width:230px}
.pu-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem;gap:.5rem}
.pu-badges{display:flex;flex-wrap:wrap;gap:.3rem}
.pu-badge{display:inline-block;padding:.18rem .55rem;border-radius:4px;font-size:.6rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.pu-city{font-size:1.05rem;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em;line-height:1.1;margin-bottom:.1rem}
.pu-type{font-size:.67rem;color:var(--t2);margin-bottom:.7rem}
.pu-divider{height:1px;background:var(--bd2);margin:.55rem 0 .5rem}
/* Commander card */
.pu-cmt{background:var(--s2);border-radius:8px;padding:.6rem .75rem;margin-bottom:.5rem;border:1px solid var(--bd2)}
.pu-cmt-role{font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:.25rem}
.pu-cmt-name{font-size:.84rem;font-weight:700;margin-bottom:.4rem;line-height:1.2}
.pu-cmt-phone{
  display:flex;align-items:center;gap:.5rem;
  background:var(--s3);border-radius:6px;padding:.4rem .6rem;
  text-decoration:none;color:var(--t1);transition:background .15s;
  font-size:.75rem;font-weight:600;font-family:'JetBrains Mono',monospace;
}
.pu-cmt-phone:hover,.pu-cmt-phone:active{background:#1a4f30}
.pu-cmt-phone .wa{
  background:var(--green-wa);border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;
}
.pu-row{display:flex;justify-content:space-between;align-items:center;font-size:.7rem;padding:.14rem 0}
.pu-l{color:var(--t2)}
.pu-r{font-weight:600;font-family:'JetBrains Mono',monospace;font-size:.67rem}

/* ══ BOTTOM NAV ══ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:1100;
  height:var(--bh);background:var(--s1);border-top:1px solid var(--bd);
  display:flex;align-items:stretch;
}
.bn-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.18rem;cursor:pointer;transition:background .12s;
  border:none;background:transparent;color:var(--t2);padding:.4rem .2rem;
  font-family:'Barlow',sans-serif;
}
.bn-btn:active{background:var(--s2)}
.bn-btn.active{color:var(--c2)}
.bn-ico{font-size:1.1rem;line-height:1}
.bn-lbl{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}

/* ══ PANEL (slide-up on mobile) ══ */
.panel-overlay{
  position:fixed;inset:0;z-index:1200;
  background:rgba(0,0,0,.55);backdrop-filter:blur(3px);
  display:none;opacity:0;transition:opacity .25s;
}
.panel-overlay.show{display:block;opacity:1}
.panel{
  position:fixed;bottom:var(--bh);left:0;right:0;z-index:1300;
  background:var(--s1);border-top:1px solid var(--bd);
  border-radius:18px 18px 0 0;
  max-height:80vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.panel.show{transform:translateY(0)}
.panel-handle{width:36px;height:4px;background:var(--t3);border-radius:2px;margin:.75rem auto .4rem;flex-shrink:0}
.panel-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1rem .65rem;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.04em}
.panel-close{background:var(--s2);border:1px solid var(--bd);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;color:var(--t2);flex-shrink:0}
.panel-scroll{overflow-y:auto;flex:1;padding-bottom:1rem}

/* CPAI card */
.cpai-card{
  margin:.55rem .85rem 0;
  background:var(--s2);border-radius:10px;border:1px solid var(--bd2);overflow:hidden;
}
.cpai-hd{
  display:flex;align-items:center;gap:.6rem;
  padding:.65rem .85rem;cursor:pointer;transition:background .12s;
}
.cpai-hd:active{background:var(--s3)}
.cpai-stripe{width:3px;height:22px;border-radius:2px;flex-shrink:0}
.cpai-name{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;letter-spacing:.04em;flex:1}
.cpai-counts{display:flex;gap:.35rem}
.cpai-cnt{font-size:.58rem;font-weight:700;padding:.14rem .45rem;border-radius:4px;font-family:'JetBrains Mono',monospace}
.cpai-arr{font-size:.65rem;color:var(--t3);transition:transform .2s;flex-shrink:0}
.cpai-arr.open{transform:rotate(90deg)}
.cpai-body{display:none;border-top:1px solid var(--bd2)}
.cpai-body.open{display:block}

/* BPM row */
.bpm-row{
  display:flex;align-items:center;gap:.55rem;
  padding:.5rem .85rem .5rem 1.2rem;cursor:pointer;
  border-top:1px solid var(--bd2);transition:background .12s;
}
.bpm-row:first-child{border-top:none}
.bpm-row:active{background:var(--s3)}
.bpm-bullet{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bpm-info{flex:1;min-width:0}
.bpm-num{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.03em}
.bpm-sede{font-size:.62rem;color:var(--t2);font-family:'JetBrains Mono',monospace;margin-top:.05rem}
.bpm-cmt-mini{font-size:.6rem;color:var(--t3);margin-top:.03rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bpm-cnt{font-size:.6rem;font-weight:700;padding:.12rem .42rem;border-radius:4px;font-family:'JetBrains Mono',monospace}

/* City list inside BPM */
.city-sub{background:var(--bg);border-top:1px solid var(--bd2);padding:.35rem .6rem .45rem 1.6rem;display:none}
.city-sub.open{display:block}
.city-sub-item{
  display:flex;align-items:center;gap:.4rem;
  padding:.28rem .3rem;border-radius:5px;cursor:pointer;transition:background .1s;
}
.city-sub-item:active{background:var(--s3)}
.city-sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.city-sub-name{font-size:.75rem;flex:1}
.city-sub-name.sede-name{font-weight:700}
.city-sede-lbl{font-size:.5rem;font-weight:700;padding:.08rem .3rem;border-radius:3px;font-family:'JetBrains Mono',monospace}

/* ══ LEGEND PANEL ══ */
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1rem;padding:.8rem 1rem}
.leg-item{display:flex;align-items:center;gap:.5rem;font-size:.72rem;font-family:'JetBrains Mono',monospace}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ══ FILTER PILLS (inside panel) ══ */
.filter-pills{display:flex;flex-wrap:wrap;gap:.4rem;padding:.6rem .85rem}
.fpill{
  padding:.32rem .75rem;border-radius:20px;font-size:.68rem;font-weight:700;
  cursor:pointer;border:1.5px solid transparent;transition:all .15s;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em;
  background:var(--s2);color:var(--t2);
}

/* ══ STATS BAR (inside panel) ══ */
.stats-row{display:flex;gap:.5rem;padding:.4rem .85rem .6rem;border-bottom:1px solid var(--bd2)}
.sbox{flex:1;background:var(--s2);border-radius:8px;padding:.45rem .5rem;text-align:center}
.sbox-n{font-size:1.1rem;font-weight:800;line-height:1;font-family:'Barlow Condensed',sans-serif}
.sbox-l{font-size:.52rem;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;margin-top:.1rem}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:calc(var(--bh) + .8rem);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s3);border:1px solid var(--bd);border-radius:8px;
  padding:.55rem 1rem;font-size:.78rem;font-weight:600;
  z-index:2000;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Desktop overrides */
@media(min-width:768px){
  :root{--hh:56px;--ph:44px;--bh:0px}
  #map{bottom:0}
  .bnav{display:none}
  .ds{
    position:fixed;top:calc(var(--hh) + var(--ph));left:0;bottom:0;z-index:1050;
    width:300px;background:var(--s1);border-right:1px solid var(--bd);
    display:flex;flex-direction:column;
    transform:translateX(0);transition:transform .28s ease;
  }
  .ds.hidden{transform:translateX(-100%)}
  .ds-hd{
    display:flex;align-items:center;justify-content:space-between;
    padding:.65rem 1rem;border-bottom:1px solid var(--bd);flex-shrink:0;
    font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--t2);
  }
  .ds-scroll{overflow-y:auto;flex:1;padding-bottom:1rem}
  .ds-stats{display:flex;gap:.45rem;padding:.6rem .85rem;border-bottom:1px solid var(--bd2);flex-shrink:0}
  #map{left:300px}
  #map.full{left:0}
  .dsb-toggle{
    position:fixed;top:50%;left:300px;transform:translateY(-50%);z-index:1060;
    background:var(--s2);border:1px solid var(--bd);border-left:none;
    border-radius:0 7px 7px 0;padding:.55rem .3rem;cursor:pointer;
    color:var(--t2);font-size:.75rem;transition:left .28s;
    margin-top:calc((var(--ph)) / 2);
  }
  .dsb-toggle.shifted{left:0}
  .dsb-toggle:hover{background:var(--s3);color:var(--t1)}
  /* Desktop legend */
  .dleg{
    position:fixed;bottom:1rem;left:315px;z-index:1000;
    background:rgba(12,17,24,.93);backdrop-filter:blur(10px);
    border:1px solid var(--bd);border-radius:10px;
    padding:.65rem .85rem;transition:left .28s;
  }
  .dleg.shifted{left:15px}
  .dleg-hd{font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--t2);margin-bottom:.4rem}
  .dleg .leg-grid{grid-template-columns:1fr 1fr;padding:0;gap:.2rem .8rem}
  .dleg .leg-item{font-size:.63rem}
  /* Desktop info overlay */
  .diov{
    position:fixed;bottom:1rem;right:1rem;z-index:1000;
    background:rgba(12,17,24,.93);backdrop-filter:blur(10px);
    border:1px solid var(--bd);border-radius:10px;
    padding:.75rem 1rem;min-width:190px;font-size:.72rem;
  }
  .diov-title{font-weight:800;font-size:.8rem;margin-bottom:.5rem;font-family:'Barlow Condensed',sans-serif}
  .diov-row{display:flex;justify-content:space-between;gap:1.5rem;padding:.14rem 0}
  .diov-l{color:var(--t2)}
  .diov-r{font-family:'JetBrains Mono',monospace;font-weight:600}
  /* mobile-only elements hidden on desktop */
  .panel-overlay,.panel,.bnav{display:none!important}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-shield">
      <div class="logo-pm">PMMA</div>
    </div>
    <div class="logo-txt">
      <div class="logo-title">PMMA · CPI 2026</div>
      <div class="logo-sub" id="hdr-sub">Mapa Interativo</div>
    </div>
  </div>
  <div class="sw">
    <span class="si-ico">🔍</span>
    <input class="si" id="si" placeholder="Cidade, BPM, CPAI…" autocomplete="off" spellcheck="false">
    <div class="sdrop" id="sdrop"></div>
  </div>
</header>

<!-- PILLS FILTER BAR -->
<div class="pills-bar" id="pills-bar">
  <div class="cpill todos active" id="pill-todos" onclick="pillSel(null)">Todos</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- BOTTOM NAV (mobile) -->
<nav class="bnav">
  <button class="bn-btn active" id="bn-map" onclick="mobileNav('map')">
    <span class="bn-ico">🗺️</span><span class="bn-lbl">Mapa</span>
  </button>
  <button class="bn-btn" id="bn-cpai" onclick="mobileNav('cpai')">
    <span class="bn-ico">🏛️</span><span class="bn-lbl">CPAIs</span>
  </button>
  <button class="bn-btn" id="bn-bpm" onclick="mobileNav('bpm')">
    <span class="bn-ico">🔰</span><span class="bn-lbl">BPMs</span>
  </button>
  <button class="bn-btn" id="bn-leg" onclick="mobileNav('leg')">
    <span class="bn-ico">🎨</span><span class="bn-lbl">Legenda</span>
  </button>
</nav>

<!-- MOBILE PANEL -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-hd">
    <div class="panel-title" id="panel-title">CPAIs</div>
    <div class="panel-close" onclick="closePanel()">✕</div>
  </div>
  <div class="panel-scroll" id="panel-scroll"></div>
</div>

<!-- DESKTOP SIDEBAR -->
<div class="ds" id="ds">
  <div class="ds-hd">
    <span>Estrutura CPI / PMMA</span>
    <span id="ds-info" style="font-family:'JetBrains Mono',monospace;color:var(--t3);font-size:.58rem"></span>
  </div>
  <div class="ds-stats" id="ds-stats"></div>
  <div class="ds-scroll" id="ds-scroll"></div>
</div>
<button class="dsb-toggle" id="dsb-toggle" onclick="toggleDS()">◀</button>

<!-- DESKTOP LEGEND -->
<div class="dleg" id="dleg">
  <div class="dleg-hd">Legenda — CPAIs</div>
  <div class="leg-grid" id="dleg-grid"></div>
</div>

<!-- DESKTOP INFO OVERLAY -->
<div class="diov" id="diov">
  <div class="diov-title" id="diov-title">📊 CPI — PMMA 2026</div>
  <div class="diov-row"><span class="diov-l">Total CPAIs</span><span class="diov-r">8</span></div>
  <div class="diov-row"><span class="diov-l">Total BPMs</span><span class="diov-r" id="diov-bpm">—</span></div>
  <div class="diov-row"><span class="diov-l">Municípios</span><span class="diov-r" id="diov-cid">—</span></div>
  <div class="diov-row" id="diov-sel" style="display:none;border-top:1px solid var(--bd2);margin-top:.35rem;padding-top:.35rem">
    <span class="diov-l">Filtro</span><span class="diov-r" id="diov-sel-v" style="font-size:.65rem">—</span>
  </div>
</div>

<!-- SHEET STATUS -->
<div id="sheet-status" style="
  position:fixed;bottom:calc(var(--bh) + 6px);right:8px;z-index:2000;
  font-size:.58rem;font-family:'JetBrains Mono',monospace;
  padding:.22rem .55rem;border-radius:5px;
  background:rgba(14,20,30,.88);border:1px solid rgba(255,255,255,.1);
  color:var(--t3);pointer-events:none;display:none;
  backdrop-filter:blur(4px);
"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
// GOOGLE SHEETS — integração dinâmica
// A planilha precisa estar compartilhada como
// "Qualquer pessoa com o link pode visualizar"
// ════════════════════════════════════════════════
const SHEET_ID   = '1ALAYTygaqjXh7_dbYM7zmf7ddzIw14ESYSe6TDcG8iw';
// Aba "DO CPI" — GID visível na URL da planilha
const SHEET_GID  = '185014483';
const SHEET_CSV  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;
const REFRESH_MS = 5 * 60 * 1000; // atualiza a cada 5 minutos

// ── Normaliza string para comparação robusta ──
// Remove: acentos, (SEDE), preposições, sufixo "do MA / do Maranhão"
function normName(s){
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')   // tira acentos
    .replace(/\([^)]*\)/g,' ')                          // remove (SEDE) (SEDE DO X BPM) etc
    .replace(/\bdo maranhao\b|\bde maranhao\b|\bdo ma\b|\bde ma\b/g,' ')
    .replace(/\b(de|do|da|dos|das|em|no|na|nos|nas)\b/g,' ')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ').trim();
}

// ── Parser CSV robusto (lida com aspas e vírgulas em campos) ──
function parseCSV(text){
  const rows=[];
  let cur='', inQ=false, cells=[];
  for(let i=0;i<=text.length;i++){
    const c=text[i];
    if(i===text.length||(( c==='\n'||c==='\r')&&!inQ)){
      cells.push(cur.trim().replace(/^"|"$/g,''));
      if(cells.some(x=>x)) rows.push([...cells]);
      cells=[]; cur='';
      if(c==='\r'&&text[i+1]==='\n') i++;
    } else if(c==='"'){ inQ=!inQ; }
    else if(c===','&&!inQ){ cells.push(cur.trim().replace(/^"|"$/g,'')); cur=''; }
    else cur+=c;
  }
  return rows;
}

// ── Indicador de status (canto inferior direito) ──
function setSheetStatus(msg, cor){
  const el=document.getElementById('sheet-status');
  if(!el) return;
  el.textContent=msg;
  el.style.color=cor||'var(--t3)';
  el.style.display='block';
}

// ── Reconstrói todos os markers com dados atualizados ──
function rebuildMarkers(){
  // Remove layers existentes
  Object.values(LAYERS).forEach(lg=>{ map.removeLayer(lg); });
  Object.keys(LAYERS).forEach(k=>delete LAYERS[k]);
  ALL_PINS.length=0;
  // Reconstrói
  buildMarkers();
  // Atualiza sidebar desktop
  const scroll=document.getElementById('ds-scroll');
  if(scroll) buildCpaiList(scroll);
}

// ── Carrega e aplica dados da aba "DO CPI" ──
async function loadSheet(){
  setSheetStatus('⟳ Atualizando…','var(--t3)');
  try{
    const resp = await fetch(SHEET_CSV + '&t=' + Date.now());
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);
    if(rows.length < 6) throw new Error('planilha vazia');

    // ── DIAGNÓSTICO: mostra as primeiras 8 linhas no console ──
    console.group('[mapa_cpi] Primeiras linhas do CSV:');
    rows.slice(0,8).forEach((r,i)=>console.log(`row[${i}]:`, r.slice(0,5)));
    console.groupEnd();

    // Detecta a linha de header buscando "COMANDANTE"
    let dataStart = 5;
    for(let r=0;r<Math.min(8,rows.length);r++){
      const row=rows[r].map(c=>normName(c));
      if(row.findIndex(c=>c==='comandante')>=0){ dataStart=r+1; break; }
    }
    console.log('[mapa_cpi] dataStart detectado:', dataStart, '→ primeira linha de dados:', rows[dataStart]?.slice(0,4));

    // Índices fixos conforme estrutura observada na planilha
    // Col 0: vazia | Col 1: UPM | Col 2: SEDE/MUNICÍPIO | Col 3: COMANDANTE | Col 4: CONTATO
    const COL_MUN=2, COL_CMT=3, COL_TEL=4;
    const COL_SUBCMT=5, COL_SUBTEL=6;
    const COL_EF_TOT=16, COL_VTR=20, COL_ESC=22;

    // ── Monta lookup: nome_normalizado → dados ──
    const lookup={};
    for(let r=dataStart;r<rows.length;r++){
      const row=rows[r];
      const name=(row[COL_MUN]||'').trim();
      if(!name) continue;
      const normN=normName(name);
      if(normN.startsWith('total')||normN==='sede municipio'||normN==='upmsede municipio') continue;
      const cmt=(row[COL_CMT]||'').trim();
      const tel=(row[COL_TEL]||'').trim();
      if(!cmt) continue;
      lookup[normN]={
        cmt, tel,
        subcmt: (row[COL_SUBCMT]||'').trim(),
        subtel: (row[COL_SUBTEL]||'').trim(),
        efTot:  (row[COL_EF_TOT]||'').trim(),
        vtr:    (row[COL_VTR]   ||'').trim(),
        esc:    (row[COL_ESC]   ||'').trim(),
      };
    }

    console.log('[mapa_cpi] Lookup construído:', Object.keys(lookup).length, 'entradas');
    console.log('[mapa_cpi] Primeiras chaves:', Object.keys(lookup).slice(0,5));

    if(!Object.keys(lookup).length)
      throw new Error('nenhum dado — verifique se a planilha está pública (Compartilhar → Qualquer pessoa com o link)');

    // ── Aplica ao CPAIS e loga misses ──
    let updated=0;
    const misses=[];
    Object.values(CPAIS).forEach(cpai=>{
      cpai.bpms.forEach(bpm=>{
        bpm.muns.forEach(m=>{
          const key=normName(m.n);
          const hit=lookup[key];
          if(hit){ m.cmt=hit.cmt; m.tel=hit.tel; m._sheet=hit; updated++; }
          else misses.push({html:m.n, key});
        });
        const sede=bpm.muns.find(m=>m.s);
        if(sede){ bpm.cmt=sede.cmt; bpm.tel=sede.tel; }
      });
    });

    if(misses.length){
      console.group('[mapa_cpi] Municípios SEM match (primeiros 10):');
      misses.slice(0,10).forEach(x=>console.log(`  HTML="${x.html}"  →  key="${x.key}"`));
      console.groupEnd();
    }

    rebuildMarkers();
    const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setSheetStatus(`✓ Planilha · ${hora}  (${updated} atualizados)`, '#38b85a');
  } catch(e){
    setSheetStatus(`⚠ Offline · dados locais`, '#e8a020');
    console.warn('[mapa_cpi] loadSheet:', e.message);
  }
}

// ── helpers ──
function waLink(tel){
  if(!tel||tel==="—") return null;
  const num = tel.replace(/\D/g,'');
  return `https://wa.me/55${num}`;
}
function fmtTel(tel,cor){
  if(!tel||tel==="—") return `<span style="color:var(--t3)">—</span>`;
  const wa = waLink(tel);
  return `<a class="pu-cmt-phone" href="${wa}" target="_blank" rel="noopener">
    <span class="wa">💬</span>${tel}
    <span style="margin-left:auto;font-size:.58rem;color:#25D366">WhatsApp</span>
  </a>`;
}

// ── MAP ──
const map = L.map('map',{center:[-4.9,-44.9],zoom:7,zoomControl:true,tap:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{maxZoom:16,subdomains:'abcd'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:16,subdomains:'abcd',pane:'shadowPane'}).addTo(map);

// ── Icons ──
function mkIcon(cor,isSede){
  const s=isSede?14:8;
  const glow=isSede?`box-shadow:0 0 10px ${cor}cc;`:`box-shadow:0 0 5px ${cor}55;`;
  const brd=isSede?`border:2px solid rgba(255,255,255,.8);`:`border:1.5px solid rgba(255,255,255,.3);`;
  return L.divIcon({
    className:'',
    html:`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${cor};${brd}${glow}cursor:pointer;transition:transform .15s"></div>`,
    iconSize:[s,s],iconAnchor:[s/2,s/2]
  });
}
function mkLabel(txt,cor){
  return L.divIcon({
    className:'',
    html:`<div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;
      color:${cor};pointer-events:none;white-space:nowrap;
      text-shadow:0 0 6px #000,0 0 12px #000,-1px -1px 0 #000,1px 1px 0 #000">${txt}</div>`,
    iconAnchor:[-4,8]
  });
}

// ── Build markers ──
const LAYERS={}, ALL_PINS=[];
let activeCpai=null;

function buildMarkers(){
  Object.entries(CPAIS).forEach(([ck,cpai])=>{
    const lg=L.layerGroup().addTo(map);
    LAYERS[ck]=lg;
    let sLat=0,sLng=0,cnt=0;
    cpai.bpms.forEach(b=>b.muns.forEach(m=>{sLat+=m.lat;sLng+=m.lng;cnt++;}));
    L.marker([sLat/cnt,sLng/cnt],{icon:mkLabel(ck,cpai.cor),interactive:false}).addTo(lg);

    cpai.bpms.forEach(bpm=>{
      bpm.muns.forEach(m=>{
        const mk=L.marker([m.lat,m.lng],{icon:mkIcon(cpai.cor,m.s),title:m.n,zIndexOffset:m.s?500:0});
        mk.bindPopup(buildPU(m,bpm,ck,cpai),{maxWidth:300,className:''});
        mk.on('click',()=>{if(activeCpai!==ck)selCpai(ck,false);});
        lg.addLayer(mk);
        ALL_PINS.push({cidade:m.n,cpai:ck,bpmNum:bpm.num,bpmSede:bpm.sede,cor:cpai.cor,isSede:m.s,lat:m.lat,lng:m.lng,marker:mk,cmt:m.cmt,tel:m.tel});
      });
    });
  });
}

buildMarkers();

function buildPU(m,bpm,ck,cpai){
  const c=cpai.cor;
  return `<div class="pu">
    <div class="pu-top">
      <div class="pu-badges">
        <span class="pu-badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${ck}</span>
        <span class="pu-badge" style="background:var(--s2);color:var(--t2);border:1px solid var(--bd2)">${bpm.num}</span>
        ${m.s?`<span class="pu-badge" style="background:${c}33;color:${c}">SEDE</span>`:''}
      </div>
    </div>
    <div class="pu-city">${m.n}</div>
    <div class="pu-type">${m.s?`Sede do ${bpm.num}`:`Município subordinado · ${bpm.num}`}</div>
    <div class="pu-cmt">
      <div class="pu-cmt-role">Comandante</div>
      <div class="pu-cmt-name">${m.cmt}</div>
      ${fmtTel(m.tel,c)}
    </div>
    <div class="pu-divider"></div>
    <div class="pu-row"><span class="pu-l">Batalhão</span><span class="pu-r">${bpm.num}</span></div>
    <div class="pu-row"><span class="pu-l">Sede BPM</span><span class="pu-r">${bpm.sede}</span></div>
    <div class="pu-row"><span class="pu-l">Cmt BPM</span><span class="pu-r">${bpm.cmt}</span></div>
    ${bpm.cmt!==m.cmt?`<div class="pu-row"><span class="pu-l">Tel BPM</span><span class="pu-r">${fmtTel(bpm.tel,c).replace('class="pu-cmt-phone"','class="pu-cmt-phone" style="padding:.25rem .5rem;font-size:.65rem"')}</span></div>`:''}
  </div>`;
}

// ── Select CPAI ──
function selCpai(key,doZoom){
  activeCpai=key;
  // sync pill highlights
  document.querySelectorAll('.cpill').forEach(p=>{
    p.classList.remove('active');
    p.style.background=''; p.style.borderColor=''; p.style.color='';
  });
  if(!key){
    const t=document.getElementById('pill-todos');
    if(t) t.classList.add('active');
  } else {
    const p=document.getElementById(`pill-${key}`);
    if(p&&CPAIS[key]){
      p.classList.add('active');
      const cor=CPAIS[key].cor;
      p.style.background=cor+'33'; p.style.borderColor=cor; p.style.color=cor;
    }
  }
  Object.entries(LAYERS).forEach(([k,lg])=>{
    lg.eachLayer(l=>{if(l._icon)l._icon.style.opacity=(!key||k===key)?'1':'0.07';});
  });
  if(key&&doZoom){
    const pts=ALL_PINS.filter(p=>p.cpai===key).map(p=>[p.lat,p.lng]);
    if(pts.length)map.fitBounds(pts,{padding:[50,50],maxZoom:10,animate:true});
  } else if(!key&&doZoom){
    map.setView([-4.9,-44.9],7,{animate:true});
  }
  // desktop UI
  const dsel=document.getElementById('diov-sel');
  if(dsel){
    if(key){
      dsel.style.display='flex';
      document.getElementById('diov-sel-v').textContent=key;
      document.getElementById('diov-sel-v').style.color=CPAIS[key].cor;
      document.getElementById('diov-title').textContent=`📌 ${key}`;
    } else {
      dsel.style.display='none';
      document.getElementById('diov-title').textContent='📊 CPI — PMMA 2026';
    }
  }
}

function buildCpaiList(container){
  container.innerHTML='';
  let totBpm=0,totCid=0;
  Object.entries(CPAIS).forEach(([ck,cpai])=>{
    const cidCnt=cpai.bpms.reduce((s,b)=>s+b.muns.length,0);
    totBpm+=cpai.bpms.length; totCid+=cidCnt;
    const card=document.createElement('div'); card.className='cpai-card';
    card.innerHTML=`
      <div class="cpai-hd" onclick="toggleAcc('${ck}')">
        <div class="cpai-stripe" style="background:${cpai.cor}"></div>
        <div class="cpai-name">${ck}</div>
        <div class="cpai-counts">
          <span class="cpai-cnt" style="background:${cpai.cor}22;color:${cpai.cor}">${cpai.bpms.length} BPM</span>
          <span class="cpai-cnt" style="background:var(--s2);color:var(--t2)">${cidCnt} mun</span>
        </div>
        <div class="cpai-arr" id="arr-${ck}">▶</div>
      </div>
      <div class="cpai-body" id="body-${ck}">${buildBpmRows(ck,cpai)}</div>`;
    container.appendChild(card);
  });
  return {totBpm,totCid};
}

function buildBpmRows(ck,cpai){
  return cpai.bpms.map(bpm=>`
    <div class="bpm-row" onclick="toggleBpmCities('${ck}','${bpm.num}')">
      <div class="bpm-bullet" style="background:${cpai.cor}"></div>
      <div class="bpm-info">
        <div class="bpm-num">${bpm.num}</div>
        <div class="bpm-sede">Sede: ${bpm.sede}</div>
        <div class="bpm-cmt-mini">Cmt: ${bpm.cmt}</div>
      </div>
      <span class="bpm-cnt" style="background:${cpai.cor}22;color:${cpai.cor}">${bpm.muns.length}</span>
    </div>
    <div class="city-sub" id="csub-${ck}-${bpm.num.replace(/[°\s]/g,'_')}">
      ${bpm.muns.map(m=>`
        <div class="city-sub-item" onclick="flyToMun('${m.n}','${ck}')">
          <div class="city-sub-dot" style="background:${m.s?cpai.cor:cpai.cor+'77'}"></div>
          <span class="city-sub-name${m.s?' sede-name':''}">${m.n}</span>
          ${m.s?`<span class="city-sede-lbl" style="background:${cpai.cor}33;color:${cpai.cor}">SEDE</span>`:''}
        </div>`).join('')}
    </div>`).join('');
}

function toggleAcc(ck){
  const body=document.querySelectorAll(`[id="body-${ck}"]`);
  const arrs=document.querySelectorAll(`[id="arr-${ck}"]`);
  body.forEach(b=>{
    const isOpen=b.classList.contains('open');
    // close all
    document.querySelectorAll('.cpai-body').forEach(x=>x.classList.remove('open'));
    document.querySelectorAll('.cpai-arr').forEach(x=>x.classList.remove('open'));
    if(!isOpen){b.classList.add('open');}
  });
  arrs.forEach(a=>{
    const isOpen=a.classList.contains('open');
    if(!isOpen)a.classList.add('open');
  });
  selCpai(body[0]?.classList.contains('open')?ck:null,true);
}

function toggleBpmCities(ck,bpmNum){
  const id=`csub-${ck}-${bpmNum.replace(/[°\s]/g,'_')}`;
  document.querySelectorAll(`[id="${id}"]`).forEach(el=>{
    el.classList.toggle('open');
  });
  // Fly to BPM seat
  const bpm=CPAIS[ck]?.bpms.find(b=>b.num===bpmNum);
  if(bpm){selCpai(ck,false);map.setView([bpm.lat,bpm.lng],11,{animate:true});}
}

function flyToMun(nome,ck){
  const pin=ALL_PINS.find(p=>p.cidade===nome&&p.cpai===ck);
  if(!pin)return;
  closePanel();
  selCpai(ck,false);
  map.setView([pin.lat,pin.lng],13,{animate:true});
  setTimeout(()=>pin.marker.openPopup(),450);
}

// SEARCH
// ════════════════════════════════════
const si=document.getElementById('si'),sdrop=document.getElementById('sdrop');
si.addEventListener('input',e=>doSearch(e.target.value.trim()));
si.addEventListener('keydown',e=>{if(e.key==='Escape'){sdrop.classList.remove('open');si.value='';}});
document.addEventListener('click',e=>{if(!e.target.closest('.sw'))sdrop.classList.remove('open');});

function doSearch(q){
  if(q.length<2){sdrop.classList.remove('open');return;}
  const ql=q.toLowerCase();let html='';
  // CPAI
  const cpaiHits=Object.entries(CPAIS).filter(([k])=>k.toLowerCase().includes(ql));
  if(cpaiHits.length){
    html+=`<div class="sd-grp">Comandos CPAI</div>`;
    cpaiHits.forEach(([k,cpai])=>{
      const n=cpai.bpms.reduce((s,b)=>s+b.muns.length,0);
      html+=`<div class="sd-item" onclick="sGo('cpai','${k}')">
        <div class="sd-dot" style="background:${cpai.cor}"></div>
        <div class="sd-main"><div class="sd-name">${k}</div><div class="sd-meta">${cpai.bpms.length} BPMs · ${n} municípios</div></div>
        <div class="sd-tag" style="background:${cpai.cor}22;color:${cpai.cor}">CPAI</div></div>`;
    });
  }
  // BPM
  const bpmHits=[];
  Object.entries(CPAIS).forEach(([k,cpai])=>cpai.bpms.forEach(b=>{
    if(b.num.toLowerCase().includes(ql)||b.sede.toLowerCase().includes(ql)||b.cmt.toLowerCase().includes(ql))
      bpmHits.push({k,cpai,b});
  }));
  if(bpmHits.length){
    html+=`<div class="sd-grp">Batalhões (BPM)</div>`;
    bpmHits.slice(0,6).forEach(({k,cpai,b})=>{
      html+=`<div class="sd-item" onclick="sGo('bpm','${k}','${b.num}')">
        <div class="sd-dot" style="background:${cpai.cor}"></div>
        <div class="sd-main"><div class="sd-name">🔰 ${b.num} — ${b.sede}</div><div class="sd-meta">Cmt: ${b.cmt} · ${k}</div></div>
        <div class="sd-tag" style="background:${cpai.cor}22;color:${cpai.cor}">${k}</div></div>`;
    });
  }
  // City
  const cityHits=ALL_PINS.filter(p=>p.cidade.toLowerCase().includes(ql)||p.cmt.toLowerCase().includes(ql)).slice(0,10);
  if(cityHits.length){
    html+=`<div class="sd-grp">Municípios / Comandantes</div>`;
    cityHits.forEach(p=>{
      html+=`<div class="sd-item" onclick="sGo('city','${p.cidade}','${p.cpai}')">
        <div class="sd-dot" style="background:${p.cor}${p.isSede?'':'88'}"></div>
        <div class="sd-main">
          <div class="sd-name">${p.cidade}${p.isSede?' <span style="opacity:.6;font-size:.7em">[SEDE]</span>':''}</div>
          <div class="sd-meta">${p.bpmNum} · ${p.cpai} · Cmt: ${p.cmt}</div>
        </div>
        <div class="sd-tag" style="background:${p.cor}22;color:${p.cor}">${p.cpai}</div></div>`;
    });
  }
  if(!html)html=`<div class="sd-empty">Nenhum resultado para "<b>${q}</b>"</div>`;
  sdrop.innerHTML=html; sdrop.classList.add('open');
}

function sGo(tipo,val,extra){
  si.value=''; sdrop.classList.remove('open');
  if(tipo==='cpai'){selCpai(val,true);mobileNav('map');return;}
  if(tipo==='bpm'){
    const bpm=CPAIS[val]?.bpms.find(b=>b.num===extra);
    if(bpm){selCpai(val,false);map.setView([bpm.lat,bpm.lng],12,{animate:true});mobileNav('map');}
    return;
  }
  flyToMun(val,extra); mobileNav('map');
}

let currentPanel=null;
function mobileNav(tab){
  if(window.innerWidth>=768)return;
  document.querySelectorAll('.bn-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`bn-${tab}`)?.classList.add('active');
  if(tab==='map'){closePanel();return;}
  openPanel(tab);
}

function openPanel(tab){
  const panel=document.getElementById('panel');
  const overlay=document.getElementById('overlay');
  const scroll=document.getElementById('panel-scroll');
  const title=document.getElementById('panel-title');
  currentPanel=tab;
  scroll.innerHTML='';
  if(tab==='cpai'||tab==='bpm'){
    title.textContent=tab==='cpai'?'CPAIs / BPMs':'Batalhões';
    // stats
    const sb=document.createElement('div'); sb.className='stats-row';
    scroll.appendChild(sb);
    // filter pills
    const fp=document.createElement('div'); fp.className='filter-pills';
    fp.innerHTML=`<div class="fpill" style="border-color:rgba(255,255,255,.25);color:#fff;background:rgba(255,255,255,.1)" onclick="selCpai(null,true)">Todos</div>`+
      Object.entries(CPAIS).map(([k,c])=>`<div class="fpill" style="border-color:${c.cor}55;color:${c.cor}" onclick="selCpai('${k}',true);closePanel()">${k}</div>`).join('');
    scroll.appendChild(fp);
    const r=buildCpaiList(scroll);
    buildStats(sb,r.totBpm,r.totCid);
  } else if(tab==='leg'){
    title.textContent='Legenda — CPAIs';
    const g=document.createElement('div'); g.className='leg-grid';
    buildLegend(g); scroll.appendChild(g);
    // Info
    let totBpm=0,totCid=0;
    Object.values(CPAIS).forEach(c=>{totBpm+=c.bpms.length;totCid+=c.bpms.reduce((s,b)=>s+b.muns.length,0);});
    const info=document.createElement('div');
    info.style.cssText='padding:.8rem 1rem;border-top:1px solid var(--bd2);font-size:.72rem;color:var(--t2)';
    info.innerHTML=`<b style="color:var(--t1)">PMMA · CPI 2026</b><br>Total: 8 CPAIs · ${totBpm} BPMs · ${totCid} municípios<br><br>
      <span style="color:var(--t3)">🟡 Marcador grande = Sede de BPM</span><br>
      <span style="color:var(--t3)">⚫ Marcador pequeno = Município subordinado</span>`;
    scroll.appendChild(info);
  }
  overlay.classList.add('show');
  panel.classList.add('show');
}

function closePanel(){
  document.getElementById('panel').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.bn-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('bn-map')?.classList.add('active');
  currentPanel=null;
}

// ── PILLS ──
function pillSel(key){
  activeCpai=key;
  // update pill styles
  document.querySelectorAll('.cpill').forEach(p=>{
    p.classList.remove('active');
    p.style.background='';
    p.style.borderColor='';
    p.style.color='';
  });
  if(!key){
    const t=document.getElementById('pill-todos');
    if(t){t.classList.add('active');}
  } else {
    const p=document.getElementById(`pill-${key}`);
    if(p){
      p.classList.add('active');
      const cor=CPAIS[key].cor;
      p.style.background=cor+'33';
      p.style.borderColor=cor;
      p.style.color=cor;
    }
  }
  selCpai(key, true);
}

function initPills(){
  const bar=document.getElementById('pills-bar');
  Object.entries(CPAIS).forEach(([k,cpai])=>{
    const d=document.createElement('div');
    d.className='cpill';
    d.id=`pill-${k}`;
    d.textContent=k;
    d.style.borderColor=cpai.cor+'66';
    d.style.color=cpai.cor;
    d.onclick=()=>pillSel(k);
    bar.appendChild(d);
  });
}

  document.getElementById('diov-cid').textContent=totCid;

  // Header sub on mobile
  document.getElementById('hdr-sub').textContent=`${totCid} municípios · ${totBpm} BPMs`;

  // Resize handler
  window.addEventListener('resize',()=>{
    map.invalidateSize();
    if(window.innerWidth>=768)closePanel();
  });

  // ── Google Sheets: carrega dados e agenda refresh ──
  loadSheet();
  setInterval(loadSheet, REFRESH_MS);
})();
</script>
</body>
</html>
